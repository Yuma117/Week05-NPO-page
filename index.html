<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>正直村の村長－ズ</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-50">

        <header class="bg-white shadow px-6 py-4">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <h1 class="text-2xl font-bold text-green-700">正直村の村長－ズ</h1>
                <img src="SDGs.png" alt="SDGsのロゴ" class="h-12 w-auto  mx-auto md:hidden">
                <img src="SDGs.png" alt="SDGsのロゴ" class="hidden md:block md:h-16 md:w-auto">
                <nav class="flex flex-col md:flex-row gap-2 md:gap-6 text-sm">
                    <a href="#" class="text-gray-700 hover:text-green-600">ホーム</a>
                    <a href="#" class="text-gray-700 hover:text-green-600">活動内容</a>
                    <a href="#" class="text-gray-700 hover:text-green-600">お問い合わせ</a>
                </nav>
            </div>
        </header>
        <main class="max-w-4xl mx-auto px-6 py-10">
            <section class="mb-10">
                <h2 class="text-xl font-bold mb-4">活動内容</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition text-center">
                        <p class="text-2xl mb-2">🌱</p>
                        <h3 class="font-bold">植林活動</h3>
                        <p class="text-gray-500 text-sm mt-1">月1回山に登って植林活動をします。</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition text-center">
                        <p class="text-2xl mb-2">♻️</p>
                        <h3 class="font-bold">ゴミ拾い運動</h3>
                        <p class="text-gray-500 text-sm mt-1">週1回渋谷センター街のゴミ拾い活動を主催しています。</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition text-center">
                        <p class="text-2xl mb-2">🏫</p>
                        <h3 class="font-bold">環境教育</h3>
                        <p class="text-gray-500 text-sm mt-1">小学校への出張授業を年10回実施しています。</p>
                    </div>
                </div>
            </section>
        </main>
        <footer class="bg-gray-800 text-gray-400 text-sm text-center py-6">2026 正直村の村長－ズ</footer>
    </body>
</html>
